; Ardo v2 — ESP1 "Oído + Boca"
; ESP32-S3 + ESP-IDF (PlatformIO)
[env:esp32s3]
platform             = espressif32
board                = esp32-s3-devkitc-1
framework            = espidf
monitor_speed        = 115200
monitor_filters      = esp32_exception_decoder, time

board_build.mcu      = esp32s3
board_build.f_cpu    = 240000000L
board_build.f_flash  = 80000000L
board_build.flash_mode = dio
board_build.partitions = partitions.csv

; Habilitar PSRAM Octal (ESP32-S3-DevKitC lleva 8MB OPI PSRAM)
board_build.arduino.memory_type = qio_opi

upload_speed         = 921600
upload_port          = /dev/ttyUSB0   ; ← cambiar si es necesario

build_flags =
    -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
    -DCONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY=1
    -DCORE_DEBUG_LEVEL=3
    -Wno-error=narrowing
    -fno-exceptions
